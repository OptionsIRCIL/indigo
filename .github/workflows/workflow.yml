name: Rolling build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  PYTHON: 3.13.12
  UV: 0.11.2

jobs:
  pytest:
    name: Selenium Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name:
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON }}
          check-latest: true
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV }}
      - name: Install the project
        run: uv --directory ./packages/tests sync --locked --all-extras --dev
      - name: Run tests
        run: uv --directory ./packages/tests run pytest ./src/tests/testLogin.py

  var:
    name: Generate variables
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.parse_sha.outputs.tag }}
      name: ${{ steps.parse_name.outputs.name }}
    steps:
      - name: Parse SHA
        id: parse_sha
        run: echo "TAG=main_$(cut -c 1-7 <<< '${{ github.workflow_sha }}')" >> "$GITHUB_OUTPUT"

      - name: Parse name
        id: parse_name
        run: echo "NAME=${{ env.REGISTRY }}/$(tr '[:upper:]' '[:lower:]' <<< '${{ env.IMAGE_NAME }}')" >> "$GITHUB_OUTPUT"

  build-container:
    name: Build container
    runs-on: ubuntu-latest
    needs:
      - var
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        id: setup-buildx

      - name: Configure Actions cache
        uses: actions/cache@v5
        id: cache
        if: ${{ github.event_name == 'push' }}
        with:
          path: cache-mount
          key: cache-mount-${{ github.sha }}

      - name: Configure Docker cache
        uses: reproducible-containers/buildkit-cache-dance@v3
        if: ${{ github.event_name == 'push' }}
        with:
          builder: ${{ steps.setup-buildx.outputs.name }}
          cache-dir: cache-mount
          dockerfile: Dockerfile
          skip-extraction: ${{ steps.cache.outputs.cache-hit }}

      - name: Build container and API spec
        uses: docker/bake-action@v7
        with:
          files: "bake.hcl"
          targets: "default,openapi_spec"
        env:
          IMAGE_TAGS: latest,${{ needs.var.outputs.tag }}

      - name: Upload image
        uses: actions/upload-artifact@v7
        with:
          path: 'build/image.tar'
          name: 'image.tar'

      - name: Upload API spec
        uses: actions/upload-artifact@v7
        with:
          path: 'build/api.json'
          name: 'api.json'

  publish-container:
    name: Publish container
    needs: [build-container, var]
    if: ${{ github.event_name == 'push' }}
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        id: setup-buildx

      - name: Configure Actions cache
        uses: actions/cache@v5
        id: cache
        with:
          path: cache-mount
          key: cache-mount-${{ github.sha }}

      - name: Configure Docker cache
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          builder: ${{ steps.setup-buildx.outputs.name }}
          cache-dir: cache-mount
          dockerfile: Dockerfile
          skip-extraction: ${{ steps.cache.outputs.cache-hit }}

      - name: Build container
        uses: docker/bake-action@v7
        with:
          push: true
          files: "bake.hcl"
          set: |
            default.platform=linux/amd64,linux/arm64,linux/arm/v7
            default.output=type=registry

  build-pages:
    name: Build web documentation
    needs: build-container
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        name: Download container artifact
        with:
          name: "api.json"

      - name: Overwrite existing API spec
        run: rm docs/schema/api.json && mv api.json docs/schema/api.json

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - run: uv sync

      - run: uv run zensical build --clean

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site

  publish-pages:
    name: Publish web documentation
    needs: [build-pages, publish-container]
    if: ${{ github.event_name == 'push' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
