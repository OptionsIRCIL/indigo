name: Rolling build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.REPO_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.1'

      - name: Build container
        run: make

      - uses: actions/upload-artifact@v4
        name: Upload artifact
        with:
          path: 'dist/image.tar.gz'
          name: 'image.tar.gz'