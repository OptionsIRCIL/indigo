name: Rolling build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  var:
    name: Generate version tag from workflow SHA and image name from repo name
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.parse.outputs.tag }}
      name: ${{ steps.parse.outputs.name }}
    steps:
      - name: Parse
        id: parse
        run: |
          echo "TAG=main_$(cut -c 1-7 <<< '${{ github.workflow_sha }}')" >> "$GITHUB_OUTPUT"
          echo "NAME=${OWNER,,}" >> "$GITHUB_OUTPUT"
        env:
          OWNER: '${{ env.IMAGE_NAME }}'

  build:
    name: Build container
    runs-on: ubuntu-latest
    needs:
      - var
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.REPO_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container
        uses: docker/build-push-action@v6
        with:
          context: .
          target: dist
          tags: ${{ env.IMAGE_NAME }}:${{ needs.var.outputs.tag }}, ${{ env.IMAGE_NAME }}:latest
          platforms: linux/amd64
          outputs: type=docker,dest=dist/image.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          path: 'dist/image.tar'
          name: 'image.tar'

  pages:
    needs: build
    if: ${{ github.event_name == 'push' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v5

      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - run: uv sync

      - run: uv run zensical build --clean 

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - uses: actions/deploy-pages@v4
        id: deployment
  
  publish:
    needs: build
    if: ${{ github.event_name == 'push' }}
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Fetch image
        uses: actions/download-artifact@v4
        with:
          name: image.tar

      - name: Load image
        run: docker load < image.tar

      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Publish Image
        run: docker push --all-tags ${{ env.REGISTRY }}/${{ steps.var.outputs.name }}
