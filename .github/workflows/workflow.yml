name: Rolling build

# While in development, we'll run jobs automatically (except for workflow dispatch)
# on all branches
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  tag:
    name: Generate version tag from workflow SHA
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.parse.outputs.tag }}
    steps:
      - name: Parse SHA
        id: parse
        run: echo "TAG=main_$(cut -c 1-7 <<< '${{ github.workflow_sha }}')" >> "$GITHUB_OUTPUT"

  build:
    name: Build container
    runs-on: ubuntu-latest
    needs:
      - tag
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.REPO_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container
        uses: docker/build-push-action@v6
        with:
          target: dist
          tags: OptionsIRCIL/indigo:${{ needs.tag.outputs.tag }}, OptionsIRCIL/indigo:latest
          platform: linux/amd64, linux/arm64
          outputs: type=local,dest: dist/image.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          path: 'dist/image.tar.gz'
          name: 'image.tar.gz'

  deploy:
    name: Deploy to `acm.cs.und.edu`
    runs-on: self-hosted
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/download-artifact@v4
        name: Download container artifact
        with:
          name: "image.tar.gz"

      # TODO: Finish

      - name: Install container
        run: install -m 775 indigo /stack/bin/

      - name: Install API documentation
        run: install -m 775 redoc-static.html /stack/www/api/

      - name: Restart bleeding container
        run: docker compose --project-directory /stack restart bleeding
