name: Rolling build

# While in development, we'll run jobs automatically (except for workflow dispatch)
# on all branches
on:
  push:
  pull_request:

jobs:
  tag:
    name: Generate version tag from workflow SHA
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.parse.outputs.tag }}
    steps:
      - name: Parse SHA
        id: parse
        run: echo "TAG=main_$(cut -c 1-7 <<< '${{ github.workflow_sha }}')" >> "$GITHUB_OUTPUT"

  build:
    name: Build container
    runs-on: ubuntu-latest
    needs:
      - tag
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.REPO_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container
        uses: docker/build-push-action@v6
        with:
          context: .
          target: dist
          tags: OptionsIRCIL/indigo:${{ needs.tag.outputs.tag }}, OptionsIRCIL/indigo:latest
          platforms: linux/amd64
          outputs: type=docker,dest=dist/image.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          path: 'dist/image.tar.gz'
          name: 'image.tar.gz'

  pages:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v5

      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - run: uv sync

      - run: uv run zensical build --clean 

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - uses: actions/deploy-pages@v4
        id: deployment
  
  publish:
    needs: build
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        

