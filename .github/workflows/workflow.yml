name: Rolling build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  var:
    name: Generate variables
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.parse_sha.outputs.tag }}
      name: ${{ steps.parse_name.outputs.name }}
    steps:
      - name: Parse SHA
        id: parse_sha
        run: echo "TAG=main_$(cut -c 1-7 <<< '${{ github.workflow_sha }}')" >> "$GITHUB_OUTPUT"

      - name: Parse name
        id: parse_name
        run: echo "NAME=${{ env.REGISTRY }}/$(tr '[:upper:]' '[:lower:]' <<< '${{ env.IMAGE_NAME }}')" >> "$GITHUB_OUTPUT"

  build:
    name: Build container
    runs-on: ubuntu-latest
    needs:
      - var
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.REPO_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        if: ${{ github.event_name == 'push' }}
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container
        uses: docker/bake-action@v6
        with:
          push: ${{ github.event_name == 'push' }}
          files: "bake.hcl"
          
        env:
          IMAGE_TAGS: latest,${{ needs.var.outputs.tag }}
      
      - name: Build API spec
        uses: docker/bake-action@v6
        with:
          push: false
          files: "bake.hcl"
          targets: "openapi_spec"

      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          path: 'build/image.tar'
          name: 'image.tar'
        
      - name: Upload API spec
        uses: actions/upload-artifact@v4
        with:
          path: 'build/api.json'
          name: 'api.json'

  pages:
    needs: build
    if: ${{ github.event_name == 'push' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v5

      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        name: Download container artifact
        with:
          name: "api.json"
          path: "docs/spec/api.json"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - run: uv sync

      - run: uv run zensical build --clean 

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - uses: actions/deploy-pages@v4
        id: deployment
