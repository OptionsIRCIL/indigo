# https://github.com/zensical/zensical/blob/master/python/zensical/bootstrap/zensical.toml

[project]
site_name = "Indigo CNS Documentation"
site_description = "A new project generated from the default template project."
site_author = "Options IRCIL"
#site_url = "https://www.example.com/"

repo_url = "https://github.com/OptionsIRCIL/indigo"
repo_name = "OptionsIRCIL/indigo"

copyright = """
Copyright &copy; 2026 Options IRCIL
"""

docs_dir = "docs/web"

nav = [
  { "Home" = "index.md" },
  { "Features" = "features.md" },
  { "Specification" = [
    { "Terminology" = "specifications/terminology.md" },
    { "Design" = "specifications/design.md" },
    { "REST API" = "specifications/api.md" },
    { "Security" = "specifications/security.md" }
  ] },
  { "Administration Guide" = [
    { "Installation" = "administration-guide/installation.md" },
    { "Configuration" = "administration-guide/configuration.md" },
    { "SSL Certificates" = "administration-guide/ssl.md" },
    { "Maintenance Commands" = "administration-guide/maintenance.md" }
  ] },
  { "User Manual" = [
    { "Stub" = "user-manual/stub.md" }
  ] },
  { "Contributing" = [
    { "Coding Conventions" = "contributing/convention.md" },
    { "Documentation Generation" = "contributing/online-documentation.md" }
  ] },
  { "About" = [
    { "License" = "about/license.md" },
    { "Project Authors" = "about/authors.md" }
  ] }
]

extra_css = ["stylesheets/file-tree.css"]

[project.theme]
variant = "classic"
language = "en"

features = [
    # Copy button on code fences
    "content.code.copy",

    # Hover tooltips
    "content.tooltips",

    # Next/previous page in footer
    "navigation.footer",

    # Content prefetched on link hover
    "navigation.instant.prefetch",

    # Path breadcrumbs up top
    "navigation.path",

    # Render sections in groups on desktop sidebar
    "navigation.sections",

    # Back to top button
    "navigation.top",

    # URL fragement updates while scrolling
    "navigation.tracking",

    # Highlight search results
    "search.highlight",
]


# Palette toggle for automatic mode
[[project.theme.palette]]
media = "(prefers-color-scheme)"
primary = "deep purple"
accent = "deep purple"

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
primary = "deep purple"
accent = "deep purple"
scheme = "default"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
primary = "deep purple"
accent = "deep purple"
scheme = "slate"
